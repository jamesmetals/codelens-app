<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060e20"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="46" stroke="#00e5ff" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <!-- Main circle bg -->
  <circle cx="50" cy="50" r="44" fill="url(#bgGrad)"/>
  <!-- Neon ring -->
  <circle cx="50" cy="50" r="41" stroke="#00e5ff" stroke-width="3" stroke-dasharray="8 5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="34" stroke="#00c0ea" stroke-width="1.5" opacity="0.6"/>

  <!-- Code brackets < > -->
  <path d="M22 50 L32 40 L32 44 L26 50 L32 56 L32 60 Z" fill="#00e5ff" filter="url(#glow)"/>
  <path d="M78 50 L68 40 L68 44 L74 50 L68 56 L68 60 Z" fill="#00e5ff" filter="url(#glow)"/>

  <!-- Top/bottom bracket dashes (like the original logo) -->
  <rect x="47" y="20" width="6" height="3" rx="1.5" fill="#00e5ff" opacity="0.8"/>
  <rect x="47" y="77" width="6" height="3" rx="1.5" fill="#00e5ff" opacity="0.8"/>

  <!-- Eye shape -->
  <ellipse cx="50" cy="50" rx="12" ry="8" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="5" fill="#1e0a50"/>
  <!-- Pupil highlight -->
  <circle cx="48" cy="48" r="2" fill="#a78bfa" opacity="0.8"/>
</svg>
